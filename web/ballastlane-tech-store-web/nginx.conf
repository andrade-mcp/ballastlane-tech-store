server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every client-side route returns index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed assets are immutable; cache them aggressively.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html itself must never be cached or theme/version bumps stick.
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
