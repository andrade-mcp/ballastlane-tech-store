name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Oracle VM
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    steps:
      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}

      - name: Trust host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.ORACLE_HOST }} >> ~/.ssh/known_hosts

      - name: Pull + redeploy on VM
        run: |
          ssh ${{ secrets.ORACLE_USER }}@${{ secrets.ORACLE_HOST }} \
            'sudo -E bash /home/ubuntu/ballastlane-tech-store/deploy/deploy.sh'

      - name: Smoke test public endpoints
        run: |
          set -e
          echo "auth-api:"  && curl -fsS https://auth.ballastlane-tech.store/health
          echo "store-api:" && curl -fsS https://api.ballastlane-tech.store/health
          echo "web:"       && curl -fsSI https://ballastlane-tech.store | head -1
